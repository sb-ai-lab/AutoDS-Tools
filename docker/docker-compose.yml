services:
  reverse-proxy:
    image: caddy:2.10.2
    container_name: autods-caddy
    depends_on:
      autods-frontend:
        condition: service_started
      autods-server:
        condition: service_healthy
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?PUBLIC_HOST is required}
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:?BASIC_AUTH_USERNAME is required}
      BASIC_AUTH_PASSWORD_HASH: ${BASIC_AUTH_PASSWORD_HASH:?BASIC_AUTH_PASSWORD_HASH is required}
    ports:
      - "8000:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - autods-network

  autods-frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: autods-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - autods-network

  autods-server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: autods-server
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      HOME: /root
      PYTHONUNBUFFERED: "1"
      SEARCH_BACKEND: ${SEARCH_BACKEND:-neo4j-graphrag}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    volumes:
      - autods_home:/root/.autods
      - pygrad_home:/root/.pygrad
    networks:
      - autods-network

  neo4j:
    image: neo4j:5.26.0
    container_name: autods-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
      NEO4J_db_tx__log_rotation_retention__policy: 100M size
      NEO4J_dbms_checkpoint_interval_time: 15m
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - autods-network

networks:
  autods-network:
    name: autods-network

volumes:
  autods_home:
  pygrad_home:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  caddy_data:
  caddy_config:
