[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pygrad"
version = "0.0.1"
description = "Graph RAG API Doc - Build searchable knowledge graphs from Python repository documentation"
readme = "README.md"
license = "BSD-3-Clause"
requires-python = ">=3.11"

dependencies = [
    "cognee>=0.5.6",
    "litellm>=1.81.6",
    "tree-sitter>=0.21.0",
    "tree-sitter-python>=0.21.0",
    "neo4j>=6.1.0",
    "neo4j-graphrag>=1.14.1",
    "ollama>=0.1.0",
    "httpx>=0.27.0",
    "loguru>=0.7.3",
    "platformdirs>=4.5.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "httpx>=0.27.0",
    "ruff>=0.11.0",
    "ty>=0.0.27",
]
docs = [
    "mkdocs-material>=9.0.0",
    "mkdocstrings[python]>=0.24.0",
]
server = [
    "fastapi>=0.110.0",
    "uvicorn>=0.30.0",
]

[project.scripts]
pygrad = "pygrad.cli:main"

[project.urls]
Homepage = "https://github.com/AaLexUser/pygrad"
Documentation = "https://aalexuser.github.io/pygrad/"
Repository = "https://github.com/AaLexUser/pygrad"

[tool.hatch.build.targets.wheel]
packages = ["src/pygrad"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 120
src = ["src"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["pygrad"]

[tool.ty]

[tool.ty.environment]
python-version = "3.11"

[tool.ty.rules]
all = "warn"

[[tool.ty.overrides]]
include = ["tests/**", "**/test_*.py"]

[tool.ty.overrides.rules]
all = "warn"
possibly-unresolved-reference = "ignore"
