site_name: Pygrad
site_description: Build searchable knowledge graphs from Python repository documentation using Graph RAG
site_url: https://aalexuser.github.io/pygrad/
repo_url: https://github.com/AaLexUser/pygrad
repo_name: AaLexUser/pygrad
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/graph
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - def_list
  - footnotes

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Examples:
    - examples/index.md
    - Basic Usage: examples/basic-usage.md
    - Search Queries: examples/searching.md
    - CLI Usage: examples/cli-usage.md
    - Integration: examples/integration.md
  - Architecture:
    - architecture/index.md
    - How It Works: architecture/how-it-works.md
    - Components: architecture/components.md
  - Configuration:
    - configuration/index.md
    - Ollama (Local): configuration/ollama.md
    - OpenAI: configuration/openai.md
    - Database: configuration/database.md
  - Neo4j:
    - Integration: neo4j-integration.md
    - Setup: neo4j-setup.md
  - API Reference:
    - api/index.md
    - Core Functions: api/core.md
    - Repository: api/repository.md
    - Processor: api/processor.md
    - Parser: api/parser.md
    - REST Server: api/server.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AaLexUser/pygrad
      name: Pygrad on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pygrad/
      name: Pygrad on PyPI
  generator: false
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2024 Pygrad Contributors
