[project]
name = "autods"
version = "0.1.0"
description = "Core AutoDS agent library"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27.2",
    "ipykernel>=6.29.0",
    "ipython>=8.18.0",
    "json-repair>=0.44.1,<0.45.0",
    "jupyter-client>=8.6.0",
    "langchain==1.2.17",
    "langchain-openai>=1.0.3",
    "langgraph>=1.0.0",
    "langgraph-checkpoint-sqlite>=2.0.11",
    "lark>=1.1.9",
    "loguru>=0.7.3",
    "nbclient>=0.10.2",
    "nbformat>=5.10.4",
    "platformdirs>=4.4.0",
    "psutil>=7.1.0",
    "pydantic>=2.11.0",
    "pygrad",
    "pyyaml>=6.0.2",
    "rich>=14.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autods"]

[tool.hatch.build.targets.sdist]
include = ["src/autods/**", "tests/**"]

[tool.uv.sources]
pygrad = { workspace = true }
